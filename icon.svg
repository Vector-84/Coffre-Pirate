<svg width="192" height="192" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond bois -->
  <rect width="192" height="192" fill="#8B4513"/>
  
  <!-- Coffre (principal) -->
  <rect x="40" y="80" width="112" height="60" fill="#B8860B" stroke="#000" stroke-width="3" rx="5"/>
  
  <!-- Couvercle du coffre -->
  <ellipse cx="96" cy="80" rx="56" ry="20" fill="#DAA520" stroke="#000" stroke-width="2"/>
  <path d="M 40 80 Q 40 65 96 60 Q 152 65 152 80" fill="#FFD700" stroke="#000" stroke-width="2"/>
  
  <!-- Crâne pirate en haut -->
  <circle cx="96" cy="45" r="18" fill="#FFF" stroke="#000" stroke-width="2"/>
  
  <!-- Yeux -->
  <circle cx="87" cy="40" r="4" fill="#000"/>
  <circle cx="105" cy="40" r="4" fill="#000"/>
  
  <!-- Nez -->
  <line x1="96" y1="48" x2="96" y2="52" stroke="#000" stroke-width="2"/>
  
  <!-- Os en croix (pirate crossbones) -->
  <line x1="65" y1="20" x2="127" y2="30" stroke="#FFF" stroke-width="3"/>
  <line x1="127" y1="20" x2="65" y2="30" stroke="#FFF" stroke-width="3"/>
  
  <!-- Pièces d'or en bas -->
  <circle cx="60" cy="160" r="10" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
  <line x1="56" y1="160" x2="64" y2="160" stroke="#000" stroke-width="1"/>
  
  <circle cx="96" cy="165" r="10" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
  <line x1="92" y1="165" x2="100" y2="165" stroke="#000" stroke-width="1"/>
  
  <circle cx="132" cy="160" r="10" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
  <line x1="128" y1="160" x2="136" y2="160" stroke="#000" stroke-width="1"/>
</svg>